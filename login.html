<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playbazar Live • Login</title>
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- AOS Animation -->
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <style>
    * {
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    
    body {
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* Animated Background Elements */
    body::before {
      content: '';
      position: absolute;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(246, 211, 101, 0.3), transparent 70%);
      top: -100px;
      left: -100px;
      border-radius: 50%;
      animation: float 8s ease-in-out infinite;
    }

    body::after {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(102, 126, 234, 0.3), transparent 70%);
      bottom: -150px;
      right: -150px;
      border-radius: 50%;
      animation: float 10s ease-in-out infinite reverse;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(30px, -30px) scale(1.1); }
    }

    /* Main Login Card */
    .login-container {
      max-width: 480px;
      width: 100%;
      position: relative;
      z-index: 10;
    }

    .login-card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 40px;
      padding: 45px 40px;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
    }

    /* Logo */
    .logo-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 35px;
    }
    
    .logo-icon {
      width: 55px;
      height: 55px;
      background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 15px 30px rgba(246, 211, 101, 0.4);
    }
    
    .logo-icon i {
      font-size: 30px;
      color: #1a1a2e;
    }
    
    .logo-text {
      font-size: 32px;
      font-weight: 800;
      background: linear-gradient(135deg, #fff 0%, #f6d365 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    /* Form Title */
    .form-title {
      color: white;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 10px;
      text-align: center;
    }

    .form-subtitle {
      color: rgba(255, 255, 255, 0.6);
      font-size: 15px;
      text-align: center;
      margin-bottom: 35px;
    }

    /* Input Fields */
    .input-group-custom {
      margin-bottom: 22px;
      position: relative;
    }

    .input-label {
      color: rgba(255, 255, 255, 0.8);
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 8px;
      display: block;
    }

    .input-field {
      width: 100%;
      background: rgba(255, 255, 255, 0.08);
      border: 1.5px solid rgba(255, 255, 255, 0.15);
      border-radius: 18px;
      padding: 16px 20px 16px 50px;
      color: white;
      font-size: 15px;
      font-weight: 500;
      transition: all 0.3s ease;
    }

    .input-field:focus {
      outline: none;
      border-color: #f6d365;
      background: rgba(255, 255, 255, 0.12);
      box-shadow: 0 0 0 4px rgba(246, 211, 101, 0.1);
    }

    .input-field::placeholder {
      color: rgba(255, 255, 255, 0.4);
      font-weight: 400;
    }

    .input-icon {
      position: absolute;
      left: 18px;
      bottom: 18px;
      color: #f6d365;
      font-size: 18px;
    }

    .password-toggle {
      position: absolute;
      right: 18px;
      bottom: 18px;
      color: rgba(255, 255, 255, 0.5);
      cursor: pointer;
      transition: color 0.3s;
    }

    .password-toggle:hover {
      color: #f6d365;
    }

    /* Remember & Forgot */
    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }

    .checkbox-wrapper {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .checkbox-wrapper input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #f6d365;
      cursor: pointer;
    }

    .checkbox-wrapper label {
      color: rgba(255, 255, 255, 0.7);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }

    .forgot-link {
      color: #f6d365;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s;
    }

    .forgot-link:hover {
      color: #fda085;
      text-decoration: underline;
    }

    /* Login Button */
    .btn-login {
      width: 100%;
      background: linear-gradient(135deg, #f6d365, #fda085);
      color: #1a1a2e;
      padding: 16px;
      border-radius: 18px;
      font-weight: 700;
      font-size: 16px;
      border: none;
      box-shadow: 0 15px 30px rgba(246, 211, 101, 0.3);
      transition: all 0.3s ease;
      margin-bottom: 30px;
    }

    .btn-login:hover {
      transform: translateY(-3px);
      box-shadow: 0 20px 40px rgba(246, 211, 101, 0.4);
      background: linear-gradient(135deg, #f5c955, #fc8e6e);
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      color: rgba(255, 255, 255, 0.4);
      font-size: 13px;
      margin-bottom: 25px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid rgba(255, 255, 255, 0.15);
    }

    .divider span {
      padding: 0 15px;
      text-transform: uppercase;
      font-weight: 600;
    }

    /* Social Login */
    .social-login {
      display: flex;
      gap: 15px;
      justify-content: center;
      margin-bottom: 35px;
    }

    .social-btn {
      width: 55px;
      height: 55px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      transition: all 0.3s ease;
    }

    .social-btn:hover {
      background: #f6d365;
      color: #1a1a2e;
      transform: translateY(-3px);
      border-color: #f6d365;
    }

    /* Sign Up Link */
    .signup-link {
      text-align: center;
      color: rgba(255, 255, 255, 0.6);
      font-size: 15px;
    }

    .signup-link a {
      color: #f6d365;
      font-weight: 700;
      text-decoration: none;
      margin-left: 5px;
      transition: all 0.3s;
    }

    .signup-link a:hover {
      color: #fda085;
      text-decoration: underline;
    }

    /* Back to Home */
    .back-home {
      text-align: center;
      margin-top: 25px;
    }

    .back-home a {
      color: rgba(255, 255, 255, 0.5);
      text-decoration: none;
      font-size: 14px;
      transition: all 0.3s;
    }

    .back-home a:hover {
      color: #f6d365;
    }

    /* Error/Success Message */
    .alert-message {
      background: rgba(220, 53, 69, 0.2);
      border: 1px solid rgba(220, 53, 69, 0.5);
      border-radius: 15px;
      padding: 12px 18px;
      margin-bottom: 25px;
      display: none;
    }

    .alert-message.show {
      display: block;
    }

    .alert-message.success {
      background: rgba(40, 167, 69, 0.2);
      border-color: rgba(40, 167, 69, 0.5);
    }
  </style>
</head>
<body>

<div class="login-container">
  <div class="login-card" data-aos="fade-up" data-aos-duration="800">
    
    <!-- Logo -->
    <div class="logo-wrapper">
      <div class="logo-icon">
        <i class="fas fa-crown"></i>
      </div>
      <span class="logo-text">Playbazar<span style="color: #f6d365; -webkit-text-fill-color: #f6d365;">Live</span></span>
    </div>

    <!-- Title -->
    <h2 class="form-title">Welcome Back! 👋</h2>
    <p class="form-subtitle">अपने अकाउंट में लॉगिन करें</p>

    <!-- Alert Message (Hidden by default) -->
    <div class="alert-message" id="alertMessage">
      <i class="fas fa-exclamation-circle me-2"></i>
      <span id="alertText">Invalid username or password</span>
    </div>

    <!-- Login Form -->
    <form id="loginForm">
      <!-- Username/Email -->
      <div class="input-group-custom">
        <label class="input-label">Username or Email</label>
        <i class="fas fa-user input-icon"></i>
        <input type="text" class="input-field" id="username" placeholder="Enter your username or email" required>
      </div>

      <!-- Password -->
      <div class="input-group-custom">
        <label class="input-label">Password</label>
        <i class="fas fa-lock input-icon"></i>
        <input type="password" class="input-field" id="password" placeholder="Enter your password" required>
        <i class="fas fa-eye password-toggle" id="togglePassword" onclick="togglePasswordVisibility()"></i>
      </div>

      <!-- Remember Me & Forgot Password -->
      <div class="form-options">
        <div class="checkbox-wrapper">
          <input type="checkbox" id="rememberMe" checked>
          <label for="rememberMe">Remember me</label>
        </div>
        <a href="#" class="forgot-link" data-bs-toggle="modal" data-bs-target="#forgotPasswordModal">
          Forgot Password?
        </a>
      </div>

      <!-- Login Button -->
      <button type="submit" class="btn-login">
        <i class="fas fa-sign-in-alt me-2"></i>LOGIN
      </button>
    </form>

    <!-- Divider -->
    <div class="divider">
      <span>or continue with</span>
    </div>

    <!-- Social Login -->
    <div class="social-login">
      <button class="social-btn" onclick="socialLogin('google')">
        <i class="fab fa-google"></i>
      </button>
      <button class="social-btn" onclick="socialLogin('facebook')">
        <i class="fab fa-facebook-f"></i>
      </button>
      <button class="social-btn" onclick="socialLogin('phone')">
        <i class="fas fa-phone-alt"></i>
      </button>
    </div>

    <!-- Sign Up Link -->
    <div class="signup-link">
      Don't have an account? 
      <a href="#">Sign Up Now</a>
    </div>

    <!-- Back to Home -->
    <div class="back-home">
      <a href="#"><i class="fas fa-arrow-left me-2"></i>Back to Home</a>
    </div>

  </div>
</div>

<!-- Forgot Password Modal -->
<div class="modal fade" id="forgotPasswordModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content" style="background: rgba(26, 26, 46, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 30px;">
      <div class="modal-header border-0 pt-4 px-4">
        <h5 class="modal-title text-white fw-bold">Reset Password</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body px-4 pb-4">
        <p class="text-white-50 mb-4">Enter your email address and we'll send you a link to reset your password.</p>
        <div class="input-group-custom">
          <label class="input-label">Email Address</label>
          <i class="fas fa-envelope input-icon"></i>
          <input type="email" class="input-field" placeholder="Enter your email" id="resetEmail">
        </div>
        <button class="btn-login mt-3" onclick="sendResetLink()">
          <i class="fas fa-paper-plane me-2"></i>Send Reset Link
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
  // Initialize AOS
  AOS.init({
    duration: 800,
    once: true
  });

  // Toggle Password Visibility
  function togglePasswordVisibility() {
    const passwordInput = document.getElementById('password');
    const toggleIcon = document.getElementById('togglePassword');
    
    if (passwordInput.type === 'password') {
      passwordInput.type = 'text';
      toggleIcon.classList.remove('fa-eye');
      toggleIcon.classList.add('fa-eye-slash');
    } else {
      passwordInput.type = 'password';
      toggleIcon.classList.remove('fa-eye-slash');
      toggleIcon.classList.add('fa-eye');
    }
  }

  // Login Form Submit
  document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const rememberMe = document.getElementById('rememberMe').checked;
    
    // Demo credentials (for testing)
    const demoUser = 'demo@playbazar.com';
    const demoPass = '123456';
    
    const alertMessage = document.getElementById('alertMessage');
    const alertText = document.getElementById('alertText');
    
    // Remove any existing classes
    alertMessage.classList.remove('success');
    
    if (username === demoUser && password === demoPass) {
      // Success
      alertMessage.classList.add('success', 'show');
      alertText.innerHTML = '✓ Login successful! Redirecting...';
      
      // Store login state if remember me is checked
      if (rememberMe) {
        localStorage.setItem('playbazar_user', username);
      }
      
      // Redirect after 1.5 seconds (demo)
      setTimeout(() => {
        alert('Login Successful! Welcome to Playbazar Live.');
        // window.location.href = 'dashboard.html'; // Uncomment for actual redirect
      }, 1500);
      
    } else if (username === '' || password === '') {
      // Empty fields
      alertMessage.classList.add('show');
      alertMessage.classList.remove('success');
      alertText.innerHTML = '⚠️ Please fill in all fields';
    } else {
      // Invalid credentials
      alertMessage.classList.add('show');
      alertMessage.classList.remove('success');
      alertText.innerHTML = '❌ Invalid username or password';
      
      // Demo hint
      setTimeout(() => {
        alertText.innerHTML = '💡 Demo: demo@playbazar.com / 123456';
      }, 2000);
    }
  });

  // Social Login
  function socialLogin(provider) {
    const alertMessage = document.getElementById('alertMessage');
    const alertText = document.getElementById('alertText');
    
    alertMessage.classList.add('show', 'success');
    alertText.innerHTML = `✓ Logging in with ${provider}...`;
    
    setTimeout(() => {
      alert(`Demo: ${provider} login clicked`);
      alertMessage.classList.remove('show');
    }, 1500);
  }

  // Send Reset Link
  function sendResetLink() {
    const email = document.getElementById('resetEmail').value;
    
    if (email) {
      alert(`Password reset link sent to ${email}`);
      bootstrap.Modal.getInstance(document.getElementById('forgotPasswordModal')).hide();
      
      // Show success message on main form
      const alertMessage = document.getElementById('alertMessage');
      const alertText = document.getElementById('alertText');
      alertMessage.classList.add('show', 'success');
      alertText.innerHTML = `✓ Reset link sent to ${email}`;
      
      setTimeout(() => {
        alertMessage.classList.remove('show');
      }, 3000);
    } else {
      alert('Please enter your email address');
    }
  }

  // Check for remembered user
  window.addEventListener('DOMContentLoaded', function() {
    const rememberedUser = localStorage.getItem('playbazar_user');
    if (rememberedUser) {
      document.getElementById('username').value = rememberedUser;
      document.getElementById('rememberMe').checked = true;
    }
  });

  // Enter key to submit
  document.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
      document.getElementById('loginForm').dispatchEvent(new Event('submit'));
    }
  });
</script>

</body>
</html>
